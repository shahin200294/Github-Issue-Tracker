<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker</title>
    <!-- tailwind $ daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-gray-200 flex items-center justify-center min-h-screen">
    <div class="justify-center items-center text-center space-y-10 mt-20 mb-10 ">
        <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4 shadow-lg">


            <div class="mb-[24px]">
                <img class="text-[#1F2937] inline-block mb-[24px] w-16" src="./assets/github-logo.png" alt="">
                <h2 class="text-[#1F2937] font-semibold text-[24px]">GitHub Issues Tracker</h2>
                <p class="text-[#64748B] ">Sign in to manage your issues</p>
            </div>
            <!-- username -->
            <label class="label">Username</label>
            <input id="username" type="email" class="input" placeholder="Enter Username" />
            <p class="text-purple-600 text-sm mt-1 text-left">Default: admin</p>

            <!-- password -->
            <label class="label">Password</label>
            <input id="password" type="password" class="input" placeholder="Enter Password" />
            <p class="text-purple-600 text-sm mt-1 text-left">Default: admin123</p>

            <!-- error message -->
            <p id="errorMsg" class="text-sm text-red-500 mb-3 hidden">Invalid username or password</p>

            <!-- button -->
            <button onclick="login()" class="btn btn-primary mt-4 hover:opacity-90">Sign In</button>


            <div>
                <!-- OR -->
                <div class="text-center my-4 text-gray-500">OR</div>

                <!-- Demo -->
                <div class="bg-gray-100 p-4 rounded-lg text-center">
                    <p><span class="font-semibold">Username:</span> admin</p>
                    <p><span class="font-semibold">Password:</span> admin123</p>
                </div>

            </div>
        </fieldset>

    </div>


    <script src="./script/index.js"></script>
</body>

</html>
