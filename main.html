<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Issue-Tracker</title>
    <!-- tailwind $ daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen flex flex-col">

    <!-- Navbar -->
    <section class="">
        <div class="navbar bg-base-100 shadow-sm justify-between w-11/12 mx-auto">
            <div class="flex justify-center items-center text-center gap-1 ">
                <img class="w-10" src="./assets/github-logo.png" alt="">
                <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2">
                <input type="text" placeholder=" Search issues..." class="input input-bordered w-24 md:w-auto" />
                <div class="items-center justify-center text-center">
                    <button id="issueSearch" class="btn btn-primary"><span class="text-xl">+</span> New Issue</button>
                </div>
            </div>
        </div>
    </section>


    <!-- tab section -->
    <section class="w-9/12 mx-auto mt-10">
        <div class="flex gap-4 shadow-sm rounded-lg p-4">
            <button onclick="loadIssues('all')" class="btn btn-outline btn-primary ">All</button>
            <button onclick="loadIssues('open')" class="btn btn-outline btn-primary">Open</button>
            <button onclick="loadIssues('closed')" class="btn btn-outline btn-primary">Closed</button>
        </div>



        <!-- coounter -->
        <div class="bg-white shadow-md rounded-xl p-6 flex items-center justify-between mb-10 mt-10">

            <!-- Left Part -->
            <div class="flex items-center gap-4">

                <!-- Icon -->
                <div class="bg-purple-100 p-3 rounded-full">
                    <img src="./assets/Aperture.png" alt="Issue Icon" class="w-6 h-6 text-purple-600">
                </div>

                <!-- Text -->
                <div>
                    <h2 id="countOpen" class="text-xl font-semibold"></h2>
                    <p class="text-gray-500 text-sm">
                        Track and manage your project issues
                    </p>
                </div>

            </div>

            <!-- Right Part -->
            <div class="flex gap-6 text-sm">

                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                    <p>Open</p>
                </div>

                <div class="flex items-center gap-2">
                    <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
                    <p>Closed</p>
                </div>

            </div>

        </div>
        <!-- list issue -->
        <div id="issuesContainer" class="max-w-4xl mx-auto mt-6 grid grid-cols-1 md:grid-cols-4 gap-6">



        </div>



    </section>



    <!-- modal section -->

    <section>
        <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->

        <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle space-y-10">
            <div class="modal-box">
                <h3 class="text-lg font-bold">Fix broken image uploads!</h3>
                <div class="flex gap-2 items-center">
                    <button class="btn bg-[#00A96E] text-white">Opened</button>
                    <ul class="flex gap-4 text-gray-500 text-sm">
                        <li>Opened by Fahim Ahmed</li>
                        <li>22/02/2026</li>
                    </ul>
                </div>
                <div class="flex gap-2 mt-4">
                    <button class="text-[#EF4444] bg-[#FECACA]">Bug</button>
                    <button class="text-[#D97706] bg-[#FFF8DB]">help wanted</button>
                </div>

                <p>The navigation menu doesn't collapse properly on mobile devices. Need to fix the responsive behavior.
                </p>
                <div class="flex justify-around">
                    <div>
                        <p>Assignee:</p>
                        <h5>Fahim Ahmed</h5>
                    </div>
                    <div>
                        <p>Priority:</p>
                        <button class="btn btn-error">High</button>
                    </div>
                </div>
                <div class="modal-action">
                    <form method="dialog">
                        <button class="btn bg-[#4A00FF] text-white">Close</button>
                    </form>
                </div>
            </div>
        </dialog> 
    </section>


    <script src="./script/main.js"></script>
</body>

</html>
